<style>
  *{box-sizing:border-box;margin:0;padding:0;}

  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pop{0%{transform:scale(.85);opacity:0}60%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
  .nav-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:#374151;transition:background .12s;margin-bottom:1px;}
  .nav-item:hover{background:#f0f4ff;}
  .nav-item.active{background:#eff6ff;color:#2563eb;font-weight:600;}
  .nav-child{padding-left:32px;font-size:12.5px;color:#6b7280;}
  .nav-child.active{color:#2563eb;font-weight:600;background:#eff6ff;}
  .camp-card{border:2px solid #e8ecf0;border-radius:14px;padding:18px 20px;margin-bottom:12px;background:#fafafa;cursor:pointer;transition:all .15s;}
  .camp-card:hover{border-color:#3b82f6;background:#f0f6ff;}
  .camp-card.selected{border-color:#3b82f6;background:#f0f6ff;}
  .plat-card{border:2px solid #e8ecf0;border-radius:16px;padding:28px 20px;text-align:center;background:#fafafa;cursor:pointer;transition:all .18s;box-shadow:0 1px 4px rgba(0,0,0,.04);}
  .plat-card:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.10);}
  .btn-next{padding:10px 28px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Outfit',sans-serif;}
  .btn-next:hover:not(:disabled){background:#1d4ed8!important;transform:translateY(-1px);}
  .btn-next:disabled{background:#e2e8f0!important;color:#94a3b8!important;cursor:not-allowed;}
  .btn-back{padding:10px 22px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;background:#fff;color:#374151;transition:all .15s;font-family:'Outfit',sans-serif;}
  .btn-back:hover:not(:disabled){background:#f3f4f6;}
  .btn-back:disabled{color:#cbd5e1;cursor:not-allowed;}
  input,select{font-family:'Outfit',sans-serif;transition:border .15s,box-shadow .15s;}
  input:focus,select:focus{outline:none;border-color:#3b82f6!important;box-shadow:0 0 0 3px rgba(59,130,246,.12)!important;}
  .step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;transition:all .2s;flex-shrink:0;}
  .step-line{width:16px;height:2px;border-radius:2px;margin:0 4px;}
  .card{background:#fff;border-radius:18px;padding:28px 30px;box-shadow:0 1px 12px rgba(0,0,0,.06);animation:fadeUp .35s ease both;}
  .panel{background:#fff;border-radius:16px;padding:20px;box-shadow:0 1px 12px rgba(0,0,0,.06);}
  .badge-new{font-size:9px;background:#dbeafe;color:#1d4ed8;border-radius:4px;padding:1px 5px;font-weight:700;}
  label{font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:6px;}
  .field-input{width:100%;padding:11px 12px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;color:#0f172a;background:#fafafa;}
  .field-input.prefix{padding-left:26px;}
  .prefix-wrap{position:relative;}
  .prefix-sym{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#94a3b8;pointer-events:none;}
  #sidebar{width:220px;background:#fff;border-right:1px solid #e8ecf0;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
  #main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  #topbar{background:#fff;border-bottom:1px solid #e8ecf0;padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  #content{flex:1;overflow-y:auto;padding:28px 32px;}
  .grid2{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start;}
  .grid2.full{grid-template-columns:1fr;}
  .grid2col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .budget-bar{background:#e2e8f0;border-radius:100px;overflow:hidden;}
  .spin-el{width:18px;height:18px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;display:inline-block;}
  .section-label{font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:.08em;margin-bottom:12px;text-transform:uppercase;}

// ─── Pure helpers ─────────────────────────────────────────────────────────────
const fmt     = n  => "$" + Number(n||0).toLocaleString();
const avail   = c  => c.budget - c.adSpent;          // ← simple: budget minus ad spend only
const pctUsed = c  => Math.round(c.adSpent / c.budget * 100);
const estDays = () => {
  if (!S.form.startDate || !S.form.endDate) return 0;
  return Math.max(1, Math.round((new Date(S.form.endDate) - new Date(S.form.startDate)) / 86400000));
};
const estTotal  = () => Number(S.form.dailyBudget || 0) * estDays();
const isExtPlatform = () => PLATFORMS.find(p=>p.id===S.form.platform)?.type==="external";
const liveC     = () => S.form.campaign ? S.campaigns.find(c => c.id === S.form.campaign.id) : null;
const overBudget= () => { const lc = liveC(); return lc && estTotal() > 0 && estTotal() > avail(lc); };
const canNext   = () => {
  if (S.step===0) return !!S.form.campaign;
  if (S.step===1) return !!S.form.platform;
  if (S.step===2) return isExtPlatform() || (S.form.dailyBudget && S.form.startDate && S.form.endDate && !overBudget());
  if (S.step===3) return S.form.objective && S.form.audience;
  return true;
};

// ─── Nav ──────────────────────────────────────────────────────────────────────
function renderNav() {
  document.getElementById("navMenu").innerHTML = NAV.map(item => {
    const open   = S.expandedNav.includes(item.label);
    const active = S.activeNav === item.label;
    return `<div>
      <div class="nav-item${active?" active":""}" onclick="toggleNav('${item.label}')">
        <span style="font-size:14px;">${item.icon}</span>
        <span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${item.label}</span>
        ${item.isNew ? '<span class="badge-new">NEW</span>' : ""}
        ${item.children.length ? `<span style="font-size:10px;color:#9ca3af;">${open?"▾":"▸"}</span>` : ""}
      </div>
      ${open ? item.children.map(c => `<div class="nav-item nav-child${S.activeNav===c?" active":""}" onclick="setActive('${c}')">${c}</div>`).join("") : ""}
    </div>`;
  }).join("");
}
function toggleNav(label) {
  const item = NAV.find(n=>n.label===label);
  if (item?.children.length) {
    const isExpanding = !S.expandedNav.includes(label);
    S.expandedNav = isExpanding ? [...S.expandedNav, label] : S.expandedNav.filter(x=>x!==label);
    if (isExpanding && item.children.length) S.activeNav = item.children[0];
    else if (!isExpanding) S.activeNav = label;
  } else {
    S.activeNav = label;
  }
  renderNav();
  rerender();
}
function setActive(label) { S.activeNav = label; rerender(); }

function fmtK(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + "M";
  if (n >= 1000)    return (n/1000).toFixed(1)    + "K";
  return String(n);
}

  { key:"depositAmount",  label:"Deposit Amount" },
  { key:"firstDeposit",   label:"First Deposit Users" },
  { key:"ev",             label:"EV" },
  { key:"leads",          label:"Leads" },
  { key:"clicks",         label:"Clicks" },
  { key:"impressions",    label:"Impressions" },
];

    <div style="border-bottom:1px solid #f1f5f9;">

      <!-- Expanded detail metrics -->

        <div style="font-size:12px;font-weight:700;color:#374151;margin-bottom:14px;">

        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px 32px;">
          ${[
            {label:"Impressions",        val:fmtK(m.impressions)},
            {label:"Clicks",             val:fmtK(m.clicks)},
            {label:"Leads",              val:fmtK(m.leads)},
            {label:"EV",                 val:fmt(m.ev)},
            {label:"First Deposit Users",val:m.firstDeposit.toLocaleString()},
            {label:"Deposit Amount",     val:fmt(m.depositAmount)},

  const ranked = [...ADS_MANAGERS].sort((a,b) => {
    if (rankBy === "depositAmount" || rankBy === "ev") return b.metrics[rankBy] - a.metrics[rankBy];

        ${activeFilters.map(f=>`

            onmouseover="this.style.color='#374151'" onmouseout="this.style.color='#94a3b8'">
            Clear all
          </button>` : ""}
      </div>
    </div>

    <!-- Budget vs Spent Table -->
    <div style="background:#fff;border-radius:16px;box-shadow:0 1px 12px rgba(0,0,0,.06);margin-bottom:24px;overflow:hidden;">
      <div style="padding:18px 20px 14px;border-bottom:1px solid #f1f5f9;">
        <div style="font-size:14px;font-weight:700;color:#0f172a;">Ads Manager Budget vs Spent</div>
        <div style="font-size:12px;color:#94a3b8;margin-top:4px;">Click a row to expand and view detailed metrics (impressions, clicks, leads, EV, first deposit users, deposit amount).</div>
      </div>
      <!-- Table header -->
      <div style="display:grid;grid-template-columns:32px 1fr 120px 1fr 160px;padding:10px 20px;gap:12px;background:#f8fafc;border-bottom:1px solid #f1f5f9;">

        <div style="font-size:12px;font-weight:700;color:#374151;text-align:right;">Total Budget</div>
        <div style="font-size:12px;font-weight:700;color:#374151;padding-left:8px;">Actual Spent</div>
        <div></div>
      </div>
      ${ADS_MANAGERS.map(am => budgetRow(am)).join("")}
    </div>

    <!-- Rankings -->
    <div style="background:#fff;border-radius:16px;box-shadow:0 1px 12px rgba(0,0,0,.06);overflow:hidden;">

            ${RANK_OPTIONS.map(r=>`<option value="${r.key}"${rankBy===r.key?" selected":""}>${r.label}</option>`).join("")}

      <div style="display:grid;grid-template-columns:60px 1fr 180px;padding:10px 20px;gap:12px;background:#f8fafc;border-bottom:1px solid #f1f5f9;">

      </div>
      ${ranked.map((am, idx) => {

        const isTop = idx < 3;
        return `
        <div style="display:grid;grid-template-columns:60px 1fr 180px;padding:14px 20px;gap:12px;border-bottom:1px solid #f8fafc;align-items:center;transition:background .12s;"
          onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='transparent'">
          <div style="display:flex;align-items:center;gap:6px;">
            <span style="font-size:${isTop?18:13}px;">${medals[idx]||""}</span>
            <span style="font-size:13px;font-weight:${isTop?700:500};color:${isTop?"#0f172a":"#64748b"};">${isTop?"":idx+1}</span>
          </div>
          <div style="font-size:13.5px;font-weight:${isTop?600:400};color:#0f172a;">${am.name}</div>

  Approved: {bg:"#dcfce7",color:"#166534",dot:"#22c55e"},

const TYPE_ICON = { Image:"🖼️", Video:"🎬", PDF:"📄", "Landing Page":"🌐", GIF:"✨", Ebook:"📚" };

function complianceBadge(s) {
  const c = COMPLIANCE_COLOR[s]||COMPLIANCE_COLOR.Draft;
  return `<span style="display:inline-flex;align-items:center;gap:4px;background:${c.bg};color:${c.color};border-radius:20px;padding:3px 9px;font-size:11px;font-weight:700;">
    <span style="width:5px;height:5px;border-radius:50%;background:${c.dot};flex-shrink:0;"></span>${s}
  </span>`;
}

function isExpiringSoon(dateStr) {
  if (!dateStr) return false;
  const diff = (new Date(dateStr) - new Date()) / 86400000;
  return diff >= 0 && diff <= 30;
}
function isExpired(dateStr) {
  if (!dateStr) return false;
  return new Date(dateStr) < new Date();
}

  const { view, filters, searchQ, sort, selectedAssetId } = S.dam;

  // ── filter logic ──
  let assets = S.assets.filter(a => {
    if (searchQ && !a.name.toLowerCase().includes(searchQ.toLowerCase()) && !a.id.toLowerCase().includes(searchQ.toLowerCase())) return false;
    if (filters.type     !== "All" && a.type !== filters.type) return false;
    if (filters.channel  !== "All" && !a.channels.includes(filters.channel)) return false;
    if (filters.country  !== "All" && !a.countries.includes(filters.country)) return false;
    if (filters.language !== "All" && !a.languages.includes(filters.language)) return false;
    if (filters.funnel   !== "All" && a.funnel !== filters.funnel) return false;
    if (filters.compliance!=="All" && a.complianceStatus !== filters.compliance) return false;
    if (filters.campaign !== "All" && a.campaign !== filters.campaign) return false;
    if (filters.activeOnly && !a.isActive) return false;
    return true;
  });

  if (sort === "uploadDate") assets.sort((a,b) => new Date(b.uploadDate)-new Date(a.uploadDate));
  else if (sort === "name")  assets.sort((a,b) => a.name.localeCompare(b.name));
  else if (sort === "perf")  assets.sort((a,b) => (b.performance?.impressions||0)-(a.performance?.impressions||0));

  const selAsset = selectedAssetId ? S.assets.find(a=>a.id===selectedAssetId) : null;

  function filterSelect(field, label, opts) {
    const val = filters[field];
    const active = val !== "All";
    return `<select onchange="setDamFilter('${field}',this.value)"
      style="padding:7px 10px;border:1.5px solid ${active?"#3b82f6":"#e2e8f0"};border-radius:8px;font-size:12px;
             font-weight:${active?700:500};color:${active?"#2563eb":"#374151"};background:${active?"#eff6ff":"#fff"};
             cursor:pointer;font-family:'Outfit',sans-serif;min-width:100px;">
      <option value="All">${label}</option>
      ${opts.map(o=>`<option value="${o}"${val===o?" selected":""}>${o}</option>`).join("")}
    </select>`;
  }

  function assetCard(a) {
    const expSoon = isExpiringSoon(a.expiryDate);
    const expd    = isExpired(a.expiryDate);
    const isSel   = selectedAssetId === a.id;
    return `
    <div onclick="selectAsset('${a.id}')" style="background:#fff;border-radius:14px;border:2px solid ${isSel?"#3b82f6":"#e8ecf0"};overflow:hidden;cursor:pointer;transition:all .15s;position:relative;"
      onmouseover="this.style.boxShadow='0 4px 20px rgba(0,0,0,.1)';this.style.borderColor='${isSel?"#3b82f6":"#c7d2fe"}'"
      onmouseout="this.style.boxShadow='none';this.style.borderColor='${isSel?"#3b82f6":"#e8ecf0"}'">
      <!-- Thumbnail -->
      <div style="position:relative;height:130px;background:#f1f5f9;overflow:hidden;">
        <img src="${a.thumbnail}" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'"/>
        <div style="position:absolute;top:8px;left:8px;">${complianceBadge(a.complianceStatus)}</div>
        <div style="position:absolute;top:8px;right:8px;display:flex;gap:4px;">
          ${a.isActive?`<span style="background:#22c55e;color:#fff;border-radius:6px;padding:2px 7px;font-size:10px;font-weight:700;">Active</span>`:""}
          <span onclick="event.stopPropagation();toggleFav('${a.id}')" style="background:rgba(255,255,255,.9);border-radius:6px;padding:2px 6px;font-size:14px;cursor:pointer;">${a.favorites?"❤️":"🤍"}</span>
        </div>
        ${expd?`<div style="position:absolute;bottom:0;left:0;right:0;background:rgba(239,68,68,.85);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;text-align:center;">⚠️ EXPIRED</div>`:""}
        ${expSoon&&!expd?`<div style="position:absolute;bottom:0;left:0;right:0;background:rgba(245,158,11,.85);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;text-align:center;">⏰ Expires ${a.expiryDate}</div>`:""}
      </div>
      <!-- Info -->
      <div style="padding:12px 13px;">
        <div style="font-size:12px;color:#94a3b8;font-weight:600;margin-bottom:3px;">${TYPE_ICON[a.type]||"📁"} ${a.type} · ${a.format} · ${a.dimensions}</div>
        <div style="font-size:13px;font-weight:600;color:#0f172a;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${a.name}">${a.name}</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;">
          ${a.channels.slice(0,2).map(ch=>`<span style="background:#f1f5f9;color:#475569;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:600;">${ch}</span>`).join("")}
          ${a.countries.slice(0,2).map(c=>`<span style="background:#eff6ff;color:#2563eb;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:600;">${c}</span>`).join("")}
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:11px;color:#94a3b8;">${a.size} · ${a.uploadDate}</span>
          ${a.performance?`<span style="font-size:11px;font-weight:600;color:#7c3aed;">${a.performance.impressions>=1000000?(a.performance.impressions/1000000).toFixed(1)+"M":(a.performance.impressions/1000).toFixed(0)+"K"} impr.</span>`:""}
        </div>
      </div>
    </div>`;
  }

  function assetListRow(a) {
    const expSoon = isExpiringSoon(a.expiryDate);
    const expd    = isExpired(a.expiryDate);
    return `
    <div onclick="selectAsset('${a.id}')" style="display:grid;grid-template-columns:40px 260px 100px 100px 120px 140px 120px 80px 44px;align-items:center;padding:11px 16px;gap:10px;border-bottom:1px solid #f1f5f9;cursor:pointer;transition:background .1s;"
      onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='transparent'">
      <span style="font-size:18px;text-align:center;">${TYPE_ICON[a.type]||"📁"}</span>
      <div>
        <div style="font-size:12.5px;font-weight:600;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${a.name}</div>
        <div style="font-size:11px;color:#94a3b8;">${a.id}</div>
      </div>
      <span style="font-size:12px;color:#374151;">${a.format} · ${a.size}</span>
      <span style="font-size:12px;color:#374151;">${a.dimensions}</span>
      <div>${complianceBadge(a.complianceStatus)}</div>
      <span style="font-size:12px;color:${expd?"#ef4444":expSoon?"#f59e0b":"#374151"};font-weight:${expd||expSoon?700:400};">${a.expiryDate||"—"}${expd?" ⚠️":expSoon?" ⏰":""}</span>
      <div style="display:flex;flex-wrap:wrap;gap:3px;">${a.countries.slice(0,3).map(c=>`<span style="background:#eff6ff;color:#2563eb;border-radius:4px;padding:1px 5px;font-size:10px;font-weight:600;">${c}</span>`).join("")}</div>
      <span style="font-size:12px;font-weight:700;color:${a.isActive?"#22c55e":"#94a3b8"};">${a.isActive?"Active":"—"}</span>
      <span onclick="event.stopPropagation();toggleFav('${a.id}')" style="font-size:16px;cursor:pointer;text-align:center;">${a.favorites?"❤️":"🤍"}</span>
    </div>`;
  }

  return `
  <div style="display:flex;gap:0;height:100%;animation:fadeUp .4s ease both;">
    <div style="flex:1;min-width:0;display:flex;flex-direction:column;">

      <!-- Header -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div>
          <h1 style="font-size:22px;font-weight:800;color:#0f172a;letter-spacing:-.5px;">Asset Library</h1>
          <p style="font-size:13px;color:#64748b;margin-top:3px;">${assets.length} assets found · ${S.assets.filter(a=>a.complianceStatus==="Pending").length} pending approval · ${S.assets.filter(a=>isExpiringSoon(a.expiryDate)&&!isExpired(a.expiryDate)).length} expiring soon</p>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
          <!-- View toggle -->
          <div style="display:flex;border:1.5px solid #e2e8f0;border-radius:9px;overflow:hidden;">
            <button onclick="setDamView('grid')" style="padding:7px 12px;border:none;background:${view==="grid"?"#2563eb":"#fff"};color:${view==="grid"?"#fff":"#64748b"};cursor:pointer;font-size:13px;font-family:'Outfit',sans-serif;">⊞</button>
            <button onclick="setDamView('list')" style="padding:7px 12px;border:none;background:${view==="list"?"#2563eb":"#fff"};color:${view==="list"?"#fff":"#64748b"};cursor:pointer;font-size:13px;font-family:'Outfit',sans-serif;">☰</button>
          </div>
          ${ROLES.current!=="Sales"?`
          <button onclick="setActiveNav('Upload Asset')"
            style="padding:9px 18px;background:linear-gradient(135deg,#2563eb,#4f46e5);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;box-shadow:0 3px 12px rgba(37,99,235,.3);">
            ＋ Upload Asset
          </button>`:""}
        </div>
      </div>

      <!-- Search + Filters -->
      <div style="background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:16px;box-shadow:0 1px 8px rgba(0,0,0,.05);">
        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
          <!-- Search -->
          <div style="position:relative;flex:1;min-width:180px;">
            <span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;">🔍</span>
            <input class="field-input" placeholder="Search by name or ID..." value="${searchQ}"
              oninput="setDamSearch(this.value)"
              style="padding-left:32px;font-size:13px;height:36px;"/>
          </div>
          ${filterSelect("type",     "Asset Type",  ASSET_TYPES)}
          ${filterSelect("channel",  "Channel",     ALL_CHANNELS)}
          ${filterSelect("country",  "Country",     ALL_COUNTRIES)}
          ${filterSelect("language", "Language",    ALL_LANGUAGES)}
          ${filterSelect("funnel",   "Funnel",      FUNNEL_STAGES)}
          ${filterSelect("compliance","Status",     COMPLIANCE_STATUSES)}
          <!-- Active toggle -->
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12.5px;font-weight:500;color:#374151;">
            <div onclick="toggleDamActive()" style="width:36px;height:20px;border-radius:100px;background:${filters.activeOnly?"#22c55e":"#e2e8f0"};position:relative;cursor:pointer;transition:background .2s;">
              <div style="position:absolute;top:2px;left:${filters.activeOnly?"18":"2"}px;width:16px;height:16px;background:#fff;border-radius:50%;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);"></div>
            </div>
            Active only
          </label>
          <!-- Sort -->
          <select onchange="setDamSort(this.value)"
            style="padding:7px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;font-weight:500;color:#374151;background:#fff;cursor:pointer;font-family:'Outfit',sans-serif;">
            <option value="uploadDate"${sort==="uploadDate"?" selected":""}>Sort: Newest</option>
            <option value="name"${sort==="name"?" selected":""}>Sort: Name A–Z</option>
            <option value="perf"${sort==="perf"?" selected":""}>Sort: Performance</option>
          </select>
        </div>
      </div>

      <!-- Expiry warning banner -->
      ${S.assets.filter(a=>isExpired(a.expiryDate)&&a.isActive).length>0?`
      <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:10px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px;">
        <span style="font-size:16px;">⚠️</span>
        <span style="font-size:13px;color:#991b1b;font-weight:600;">${S.assets.filter(a=>isExpired(a.expiryDate)&&a.isActive).length} active asset(s) have expired — please review and deactivate immediately.</span>
      </div>`:""}

      <!-- Grid / List -->
      ${assets.length===0?`<div style="text-align:center;padding:60px;color:#94a3b8;font-size:14px;">No assets match the current filters.</div>`:""}

      ${view==="grid"?`
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;">
        ${assets.map(a=>assetCard(a)).join("")}
      </div>
      `:`
      <!-- List header -->
      <div style="display:grid;grid-template-columns:40px 260px 100px 100px 120px 140px 120px 80px 44px;padding:9px 16px;gap:10px;background:#f8fafc;border-radius:12px 12px 0 0;border:1px solid #e8ecf0;">
        ${["","Name","Format","Dimensions","Status","Expiry","Countries","Active","Fav"].map(h=>`<div style="font-size:11px;font-weight:700;color:#64748b;">${h}</div>`).join("")}
      </div>
      <div style="background:#fff;border-radius:0 0 12px 12px;border:1px solid #e8ecf0;border-top:none;overflow:hidden;">
        ${assets.map(a=>assetListRow(a)).join("")}
      </div>
      `}
    </div>

    <!-- Detail panel (right side) -->
    ${selAsset?`
    <div style="width:320px;flex-shrink:0;margin-left:20px;background:#fff;border-radius:16px;box-shadow:0 1px 16px rgba(0,0,0,.08);overflow:hidden;position:sticky;top:0;max-height:calc(100vh - 120px);overflow-y:auto;">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid #f1f5f9;">
        <div style="font-size:13px;font-weight:700;color:#0f172a;">Asset Detail</div>
        <span onclick="selectAsset(null)" style="cursor:pointer;color:#94a3b8;font-size:16px;padding:2px 6px;border-radius:6px;"
          onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='transparent'">✕</span>
      </div>
      <img src="${selAsset.thumbnail}" style="width:100%;height:160px;object-fit:cover;"/>
      <div style="padding:16px;">
        <div style="font-size:11px;color:#94a3b8;font-weight:600;margin-bottom:4px;">${selAsset.id}</div>
        <div style="font-size:14px;font-weight:700;color:#0f172a;margin-bottom:10px;line-height:1.4;">${selAsset.name}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">
          ${complianceBadge(selAsset.complianceStatus)}
          ${selAsset.isActive?`<span style="background:#dcfce7;color:#166534;border-radius:20px;padding:3px 9px;font-size:11px;font-weight:700;">Active</span>`:`<span style="background:#f1f5f9;color:#64748b;border-radius:20px;padding:3px 9px;font-size:11px;font-weight:700;">Inactive</span>`}
        </div>

        <!-- Detail rows -->
        ${[
          ["Type",      `${TYPE_ICON[selAsset.type]} ${selAsset.type}`],
          ["Format",    selAsset.format],
          ["Size",      selAsset.size],
          ["Dimensions",selAsset.dimensions],
          ["Uploaded",  `${selAsset.uploadedBy} · ${selAsset.uploadDate}`],
          ["Campaign",  selAsset.campaign],
          ["Funnel",    selAsset.funnel],
          ["Channels",  selAsset.channels.join(", ")||"—"],
          ["Countries", selAsset.countries.join(", ")||"—"],
          ["Languages", selAsset.languages.join(", ")||"—"],
          ["Entity",    selAsset.entity.join(", ")||"—"],
          ["License",   selAsset.licenseType.join(", ")||"—"],
          ["Restricted",selAsset.restrictedRegions.join(", ")||"None"],
          ["Expiry",    selAsset.expiryDate||(isExpired(selAsset.expiryDate)?"⚠️ EXPIRED":isExpiringSoon(selAsset.expiryDate)?"⏰ Soon":"—")],
          ["Approved by",selAsset.approvedBy||"—"],
        ].map(([k,v])=>`
          <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f8fafc;font-size:12.5px;">
            <span style="color:#94a3b8;font-weight:600;min-width:90px;">${k}</span>
            <span style="color:#0f172a;font-weight:500;text-align:right;max-width:160px;word-break:break-word;">${v}</span>
          </div>`).join("")}

        <!-- Performance -->
        ${selAsset.performance?`
        <div style="background:linear-gradient(135deg,#f5f3ff,#eff6ff);border-radius:12px;padding:12px 14px;margin-top:12px;">
          <div style="font-size:11px;font-weight:700;color:#7c3aed;margin-bottom:8px;">📊 PERFORMANCE</div>
          ${[
            ["Impressions", selAsset.performance.impressions>=1000000?(selAsset.performance.impressions/1000000).toFixed(1)+"M":(selAsset.performance.impressions/1000).toFixed(0)+"K"],
            ["CTR",         selAsset.performance.ctr],
            ["CPC",         selAsset.performance.cpc],
          ].map(([k,v])=>`
            <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px;">
              <span style="color:#7c3aed;">${k}</span><span style="font-weight:700;color:#0f172a;">${v}</span>
            </div>`).join("")}
        </div>`:""}

        <!-- Actions -->
        <div style="display:flex;flex-direction:column;gap:8px;margin-top:14px;">
          <button style="width:100%;padding:10px;background:#2563eb;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;">
            ⬇ Download
          </button>

          <!-- Generate Tracking Link button -->
          <button onclick="openTlModal('${selAsset.id}')"
            style="width:100%;padding:10px;background:#f5f3ff;color:#7c3aed;border:1.5px solid #ddd6fe;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;"
            onmouseover="this.style.background='#ede9fe'" onmouseout="this.style.background='#f5f3ff'">
            🔗 Generate Tracking Link
          </button>

          ${ROLES.current==="Compliance"&&selAsset.complianceStatus==="Pending"?`
          <div style="display:flex;gap:8px;">
            <button onclick="approveAsset('${selAsset.id}')" style="flex:1;padding:9px;background:#22c55e;color:#fff;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;">✓ Approve</button>
            <button onclick="rejectAsset('${selAsset.id}')"  style="flex:1;padding:9px;background:#ef4444;color:#fff;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;">✕ Reject</button>
          </div>`:""}
          ${ROLES.current==="Marketing"||ROLES.current==="Admin"?`
          <button onclick="toggleAssetActive('${selAsset.id}')" style="width:100%;padding:9px;background:${selAsset.isActive?"#fef2f2":"#f0fdf4"};color:${selAsset.isActive?"#991b1b":"#166534"};border:1.5px solid ${selAsset.isActive?"#fecaca":"#bbf7d0"};border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;">
            ${selAsset.isActive?"Deactivate Asset":"Activate Asset"}
          </button>`:""}
        </div>
      </div>
    </div>`:""}

    <!-- Tracking Link Modal overlay -->
    ${S.dam.tlModal.show && selAsset ? (() => {
      const tl = S.dam.tlModal;
      const a  = selAsset;
      // build UTM preview
      const srcVal = tl.source || (a.channels[0]||"").toLowerCase().replace(/\s+/g,"-");
      const ctrVal = tl.country || a.countries[0] || "";
      const campVal = (a.campaign||"").toLowerCase().replace(/\s+/g,"-");
      const contentVal = a.id + "_" + a.name.substring(0,20).replace(/\s+/g,"-");
      const termVal = tl.term || "";
      const base = tl.landingUrl || "https://yoursite.com/lp";
      const params = [
        `utm_source=${srcVal}`,
        `utm_medium=paid`,
        `utm_campaign=${campVal}`,
        `utm_content=${contentVal}`,
        ctrVal ? `utm_country=${ctrVal}` : "",
        termVal ? `utm_term=${termVal}` : "",
      ].filter(Boolean).join("&");
      const fullUrl = base.includes("?") ? `${base}&${params}` : `${base}?${params}`;

      return `
      <div style="position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:999;display:flex;align-items:center;justify-content:center;animation:fadeUp .2s ease both;"
        onclick="if(event.target===this)closeTlModal()">
        <div style="background:#fff;border-radius:20px;width:580px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden;animation:pop .3s cubic-bezier(.34,1.56,.64,1) both;">

          <!-- Modal header -->
          <div style="background:linear-gradient(135deg,#f5f3ff,#eff6ff);padding:18px 22px;border-bottom:1px solid #e8ecf0;display:flex;justify-content:space-between;align-items:center;">
            <div>
              <div style="font-size:15px;font-weight:800;color:#0f172a;">🔗 Generate Tracking Link</div>
              <div style="font-size:12px;color:#7c3aed;margin-top:2px;font-weight:500;">${a.id} · ${a.name.substring(0,36)}${a.name.length>36?"…":""}</div>
            </div>
            <span onclick="closeTlModal()" style="cursor:pointer;color:#94a3b8;font-size:18px;padding:4px 8px;border-radius:8px;"
              onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='transparent'">✕</span>
          </div>

          <div style="padding:22px 24px;">

            <!-- Auto-filled fields -->
            <div style="font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:.07em;margin-bottom:10px;">AUTO-FILLED FROM ASSET</div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:18px;">
              ${[
                ["utm_campaign", campVal, "#2563eb","#eff6ff"],
                ["utm_medium",   "paid",  "#475569","#f1f5f9"],
                ["utm_content",  contentVal.substring(0,18)+"…", "#7c3aed","#f5f3ff"],
              ].map(([k,v,c,bg])=>`
                <div style="background:${bg};border-radius:10px;padding:10px 12px;">
                  <div style="font-size:10px;font-weight:700;color:${c};margin-bottom:3px;">${k}</div>
                  <div style="font-size:11.5px;font-weight:600;color:#0f172a;word-break:break-all;">${v}</div>
                </div>`).join("")}
            </div>

            <!-- Editable fields -->
            <div style="font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:.07em;margin-bottom:10px;">FILL IN / CONFIRM</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">
              <div>
                <label style="font-size:11px;font-weight:700;color:#64748b;display:block;margin-bottom:5px;">SOURCE (utm_source) *</label>
                <select class="field-input" onchange="setTlField('source',this.value);rerender();" style="font-size:13px;">
                  <option value="">Auto: ${srcVal}</option>
                  ${ALL_CHANNELS.map(ch=>`<option value="${ch.toLowerCase().replace(/\s+/g,"-")}"${tl.source===ch.toLowerCase().replace(/\s+/g,"-")?" selected":""}>${ch}</option>`).join("")}
                </select>
              </div>
              <div>

// ─── Channel Budget Management Page ──────────────────────────────────────────
function fmtCurrency(n, cur) {
  const sym = cur==="EUR"?"€":cur==="AUD"?"A$":cur==="GBP"?"£":"$";
  return sym + Number(n||0).toLocaleString();
}
const REGION_COLOR = { APAC:"#2563eb", LATAM:"#16a085", EMEA:"#7c3aed" };
const CH_TYPE_BADGE = t => t==="programmatic"
  ? `<span style="background:#eff6ff;color:#2563eb;border-radius:5px;padding:1px 7px;font-size:10px;font-weight:700;">Programmatic</span>`
  : `<span style="background:#fef3e2;color:#b45309;border-radius:5px;padding:1px 7px;font-size:10px;font-weight:700;">External Media</span>`;

const statusBadgeCbm = s => {
  const cfg = s==="Paid" ? {bg:"#dcfce7",color:"#166534",dot:"#22c55e"} : {bg:"#fef9c3",color:"#854d0e",dot:"#eab308"};
  return `<span style="display:inline-flex;align-items:center;gap:5px;background:${cfg.bg};color:${cfg.color};border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;"><span style="width:6px;height:6px;border-radius:50%;background:${cfg.dot};"></span>${s}</span>`;
};
const FLAG = {"AU":"🇦🇺","BR":"🇧🇷","ES":"🇪🇸","KR":"🇰🇷"};

function channelBudgetHTML() {
  const { selectedCountryId, selectedChannelId, expandedInvoiceId, showAddInvoice, showAddChannel, showAddCountry, newInv, newChannel } = S.cbm;
  const cty = S.countryBudgets.find(c=>c.id===selectedCountryId);
  const ch  = selectedChannelId && cty ? cty.channels.find(c=>c.id===selectedChannelId) : null;
  const allocTotal = Object.values(newInv.allocations).reduce((s,v)=>s+Number(v||0),0);
  const invAmount  = Number(newInv.amount||0);
  const allocDiff  = invAmount - allocTotal;

  // Country tabs
  const countryTabsHtml = S.countryBudgets.map(c => {
    const pendingCt = S.invoices.filter(i=>i.countryId===c.id&&i.status==="Pending").length;
    const sel = selectedCountryId===c.id && !showAddCountry;
    return `<button onclick="selectCountry('${c.id}')"
      style="padding:10px 16px;border-radius:12px;border:2px solid ${sel?"#3b82f6":"#e2e8f0"};
             background:${sel?"#eff6ff":"#fff"};color:${sel?"#2563eb":"#374151"};
             font-size:13px;font-weight:${sel?700:500};cursor:pointer;font-family:'Outfit',sans-serif;
             display:flex;align-items:center;gap:8px;transition:all .15s;">
      <span style="font-size:18px;">${FLAG[c.country]||"🌍"}</span>
      ${c.country}
      <span style="font-size:10px;color:${sel?"#93c5fd":"#94a3b8"};background:${sel?"rgba(255,255,255,.6)":"#f1f5f9"};padding:1px 6px;border-radius:5px;">${c.currency}</span>
      ${pendingCt?`<span style="background:#ef4444;color:#fff;border-radius:20px;padding:1px 6px;font-size:10px;font-weight:700;">${pendingCt}</span>`:""}
    </button>`;
  }).join("") + `
  <button onclick="toggleAddCountry()"
    style="padding:10px 14px;border-radius:12px;border:2px dashed ${showAddCountry?"#3b82f6":"#cbd5e1"};
           background:${showAddCountry?"#eff6ff":"transparent"};color:${showAddCountry?"#2563eb":"#94a3b8"};
           font-size:13px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;">
    ${showAddCountry?"✕ Cancel":"＋ Add Country"}
  </button>`;

  if (!cty) return `<div style="padding:40px;text-align:center;color:#94a3b8;">Select a country to begin.</div>`;

  const allCtyInvoices = S.invoices.filter(i=>i.countryId===selectedCountryId);
  const ctyInvoiced    = allCtyInvoices.reduce((s,i)=>s+i.amount,0);
  const ctyPaid        = allCtyInvoices.filter(i=>i.status==="Paid").reduce((s,i)=>s+i.amount,0);
  const ctyPending     = allCtyInvoices.filter(i=>i.status==="Pending").length;
  const ctyChBudget    = cty.channels.reduce((s,c)=>s+c.monthlyBudget,0);

  const chInvoices = ch ? S.invoices.filter(i=>i.channelId===ch.id) : [];
  const chInvoiced = chInvoices.reduce((s,i)=>s+i.amount,0);
  const chPaid     = chInvoices.filter(i=>i.status==="Paid").reduce((s,i)=>s+i.amount,0);
  const chPending  = chInvoices.filter(i=>i.status==="Pending").length;

  function summaryCards(items) {
    return `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;">
      ${items.map(c=>`<div style="background:${c.bg};border-radius:14px;padding:16px 18px;">
        <div style="font-size:11px;font-weight:700;color:${c.color};letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;">${c.label}</div>
        <div style="font-size:20px;font-weight:800;color:#0f172a;">${c.value}</div>
        <div style="font-size:11px;color:#64748b;margin-top:3px;">${c.sub}</div>
      </div>`).join("")}
    </div>`;
  }

  // ── Country overview ──
  function countryOverview() {
    const channelCards = cty.channels.map(ch => {
      const invs   = S.invoices.filter(i=>i.channelId===ch.id);
      const invAmt = invs.reduce((s,i)=>s+i.amount,0);
      const paidAmt= invs.filter(i=>i.status==="Paid").reduce((s,i)=>s+i.amount,0);
      const pendCt = invs.filter(i=>i.status==="Pending").length;
      const pct    = Math.min(100,Math.round(invAmt/ch.monthlyBudget*100));
      return `<div onclick="selectChannel('${ch.id}')" style="background:#fff;border-radius:14px;border:2px solid #e8ecf0;padding:18px;cursor:pointer;transition:all .15s;"
        onmouseover="this.style.borderColor='#3b82f6';this.style.boxShadow='0 4px 16px rgba(37,99,235,.1)'"
        onmouseout="this.style.borderColor='#e8ecf0';this.style.boxShadow='none'">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
          <div>
            <div style="font-size:14px;font-weight:700;color:#0f172a;">${ch.name}</div>
            <div style="margin-top:4px;">${CH_TYPE_BADGE(ch.type)}</div>
          </div>
          ${pendCt?`<span style="background:#ef4444;color:#fff;border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700;">${pendCt} pending</span>`:""}
        </div>
        <div style="margin-bottom:10px;">
          <div style="display:flex;justify-content:space-between;font-size:12px;color:#64748b;margin-bottom:4px;">
            <span>Invoiced vs Budget</span><span style="font-weight:600;color:#0f172a;">${pct}%</span>
          </div>
          <div style="background:#e2e8f0;border-radius:100px;height:6px;overflow:hidden;">
            <div style="width:${pct}%;height:100%;background:${pct>90?"#ef4444":"#3b82f6"};border-radius:100px;"></div>
          </div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:12.5px;"><span style="color:#64748b;">Monthly Budget</span><span style="font-weight:700;color:#0f172a;">${fmtCurrency(ch.monthlyBudget,ch.currency)}</span></div>
        <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-top:3px;"><span style="color:#64748b;">Invoiced</span><span style="font-weight:600;color:#7c3aed;">${fmtCurrency(invAmt,ch.currency)}</span></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-top:3px;"><span style="color:#64748b;">Paid</span><span style="font-weight:600;color:#166534;">${fmtCurrency(paidAmt,ch.currency)}</span></div>
        <div style="margin-top:10px;font-size:11px;color:#94a3b8;">${ch.campaigns.length} campaign(s) · ${invs.length} invoice(s) · Click →</div>
      </div>`;
    }).join("");

    const addCard = `<div onclick="toggleAddChannel()" style="background:transparent;border-radius:14px;border:2px dashed #cbd5e1;padding:18px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:190px;transition:all .15s;"
      onmouseover="this.style.borderColor='#3b82f6';this.style.background='#f8fafc'"
      onmouseout="this.style.borderColor='#cbd5e1';this.style.background='transparent'">
      <span style="font-size:28px;">＋</span>
      <span style="font-size:13px;font-weight:600;color:#94a3b8;">Add Channel</span>
    </div>`;

    return summaryCards([
      {label:"Total Channel Budgets", value:fmtCurrency(ctyChBudget,cty.currency), sub:`${cty.channels.length} channels · ${cty.currency}/mo`, color:"#2563eb", bg:"#eff6ff"},
      {label:"Total Invoiced", value:fmtCurrency(ctyInvoiced,cty.currency), sub:`${allCtyInvoices.length} invoices`, color:"#7c3aed", bg:"#f5f3ff"},
      {label:"Total Paid", value:fmtCurrency(ctyPaid,cty.currency), sub:"confirmed", color:"#166534", bg:"#dcfce7"},
      {label:"Pending Payment", value:ctyPending+" invoice"+(ctyPending!==1?"s":""), sub:"awaiting finance", color:"#92400e", bg:"#fef9c3"},
    ]) + `
    <div style="font-size:13px;font-weight:700;color:#0f172a;margin-bottom:12px;">Channels in ${cty.country}</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;">
      ${channelCards}${addCard}
    </div>`;
  }

  // ── Channel drill-down ──
  function channelDetail() {
    const campRows = ch.campaigns.map(cid => {
      const camp = S.campaigns.find(c=>c.id===cid);
      if (!camp) return "";
      const campTotal = chInvoices.reduce((s,i)=>s+i.allocations.filter(a=>a.campaignId===cid).reduce((ss,a)=>ss+a.amount,0),0);
      return `<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid #f8fafc;">
        <div>
          <div style="font-size:13px;font-weight:600;color:#0f172a;">${camp.name}</div>
          <div style="font-size:11px;color:#94a3b8;margin-top:2px;">${camp.id}</div>
        </div>
        <div style="font-size:13px;font-weight:700;color:#7c3aed;">${fmtCurrency(campTotal,ch.currency)}</div>
      </div>`;
    }).join("");

    const invoiceRows = chInvoices.map(inv => {
      const isOpen = expandedInvoiceId===inv.id;
      const allocHtml = inv.allocations.map(a=>`
        <div style="font-size:13px;color:#374151;padding:6px 0;">${a.campaignName}</div>
        <div style="font-size:13px;font-weight:600;color:#7c3aed;text-align:right;padding:6px 0;">${fmtCurrency(a.amount,inv.currency)}</div>
        <div style="font-size:12px;color:#94a3b8;text-align:right;padding:6px 0;">${Math.round(a.amount/inv.amount*100)}%</div>`).join("");
      return `<div style="border-bottom:1px solid #f1f5f9;">
        <div onclick="toggleInvoice('${inv.id}')" style="display:grid;grid-template-columns:32px 140px 110px 1fr 140px 160px 50px;align-items:center;padding:14px 20px;gap:12px;cursor:pointer;"
          onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='transparent'">
          <span style="font-size:13px;color:#94a3b8;text-align:center;">${isOpen?"−":"+"}</span>
          <span style="font-size:12.5px;font-weight:600;color:#0f172a;font-family:monospace;">${inv.invoiceNo}</span>
          <span style="font-size:12px;color:#64748b;">${inv.date}</span>
          <span style="font-size:13px;font-weight:700;color:#0f172a;">${fmtCurrency(inv.amount,inv.currency)}</span>
          <span>${statusBadgeCbm(inv.status)}</span>

// ─── Payment Calendar ─────────────────────────────────────────────────────────
function paymentCalendarHTML() {
  const { year, month, selectedDate, view } = S.cal;
  const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const dayNames   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  // payments for this month
  const monthStr = `${year}-${String(month+1).padStart(2,"0")}`;
  const monthPayments = S.influencerPayments.filter(p => p.dueDate.startsWith(monthStr));
  const totalPending  = monthPayments.filter(p=>p.status==="Pending").reduce((s,p)=>s+p.amount,0);
  const totalPaid     = monthPayments.filter(p=>p.status==="Completed").reduce((s,p)=>s+p.amount,0);
  const pendingCount  = monthPayments.filter(p=>p.status==="Pending").length;
  const upcomingCount = monthPayments.filter(p => {
    if (p.status!=="Pending") return false;
    const diff = (new Date(p.dueDate) - new Date()) / 86400000;
    return diff >= 0 && diff <= 3;
  }).length;

  // group by date
  const byDate = {};
  monthPayments.forEach(p => {
    const d = p.dueDate;
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(p);
  });

  // selected date payments
  const selDateStr = selectedDate ? `${year}-${String(month+1).padStart(2,"0")}-${String(selectedDate).padStart(2,"0")}` : null;
  const selPayments = selDateStr ? (byDate[selDateStr]||[]) : [];

  // calendar grid
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const today = new Date();
  const isCurrentMonth = today.getFullYear()===year && today.getMonth()===month;

  function amtLabel(pmts) {
    const total = pmts.reduce((s,p)=>s+p.amount,0);
    const cur   = pmts[0]?.currency||"USD";
    const sym   = cur==="EUR"?"€":"$";
    return `${sym}${total>=1000?(total/1000).toFixed(1)+"k":total}`;
  }

  const calCells = [];
  for (let i=0; i<firstDay; i++) calCells.push(null);
  for (let d=1; d<=daysInMonth; d++) calCells.push(d);

  const calRows = [];
  for (let i=0; i<calCells.length; i+=7) calRows.push(calCells.slice(i,i+7));

  const calGrid = calRows.map(row => `
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;">
      ${row.map(d => {
        if (!d) return `<div style="min-height:80px;"></div>`;
        const dStr = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
        const pmts = byDate[dStr]||[];
        const hasPending   = pmts.some(p=>p.status==="Pending");
        const hasCompleted = pmts.some(p=>p.status==="Completed");
        const isToday      = isCurrentMonth && today.getDate()===d;
        const isSel        = selectedDate===d;
        const isUpcoming   = hasPending && (() => { const diff=(new Date(dStr)-new Date())/86400000; return diff>=0&&diff<=3; })();
        return `
        <div onclick="selectCalDate(${d})"
          style="min-height:80px;border-radius:12px;padding:8px;cursor:${pmts.length?"pointer":"default"};
                 background:${isSel?"#eff6ff":isUpcoming?"#fffbeb":"#fff"};
                 border:2px solid ${isSel?"#3b82f6":isUpcoming?"#fcd34d":hasPending?"#dbeafe":hasCompleted?"#dcfce7":"#f1f5f9"};
                 transition:all .15s;"
          onmouseover="if(${pmts.length>0})this.style.borderColor='#3b82f6'"
          onmouseout="this.style.borderColor='${isSel?"#3b82f6":isUpcoming?"#fcd34d":hasPending?"#dbeafe":hasCompleted?"#dcfce7":"#f1f5f9"}'">
          <div style="font-size:12px;font-weight:${isToday?800:500};color:${isToday?"#fff":"#374151"};
                      ${isToday?"background:#2563eb;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;":""}
                      margin-bottom:4px;">${d}</div>
          ${pmts.length?`
            ${hasPending?`<div style="background:#dbeafe;color:#1d4ed8;border-radius:6px;padding:2px 5px;font-size:10px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
              💸 ${amtLabel(pmts.filter(p=>p.status==="Pending"))}
            </div>`:""}
            ${hasCompleted?`<div style="background:#dcfce7;color:#166534;border-radius:6px;padding:2px 5px;font-size:10px;font-weight:700;margin-bottom:2px;">
              ✓ ${amtLabel(pmts.filter(p=>p.status==="Completed"))}
            </div>`:""}
            <div style="font-size:10px;color:#94a3b8;">${pmts.length} payment${pmts.length>1?"s":""}</div>
          `:""}
        </div>`;
      }).join("")}
    </div>`).join("");

  // list view rows
  const sortedPayments = [...monthPayments].sort((a,b)=>a.dueDate.localeCompare(b.dueDate));

  const listRows = sortedPayments.map(p => {
    const sym = p.currency==="EUR"?"€":"$";
    return `
    <div style="display:grid;grid-template-columns:100px 1fr 140px 160px 100px;align-items:center;padding:13px 20px;gap:12px;border-bottom:1px solid #f1f5f9;transition:background .1s;"
      onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='transparent'">
      <div>
        <div style="font-size:13px;font-weight:700;color:#0f172a;">${p.dueDate.slice(5)}</div>
      </div>
      <div>
        <div style="font-size:13px;font-weight:600;color:#0f172a;">${p.influencerName}</div>
        <div style="font-size:11px;color:#94a3b8;margin-top:1px;">${p.influencerId} · ${p.region}</div>
      </div>
      <div><span style="background:${p.type==="Monthly Fee"?"#eff6ff":"#f5f3ff"};color:${p.type==="Monthly Fee"?"#2563eb":"#7c3aed"};border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600;">${p.type}</span></div>
      <div style="font-size:15px;font-weight:800;color:#0f172a;">${sym}${p.amount.toLocaleString()} <span style="font-size:11px;font-weight:500;color:#94a3b8;">${p.currency}</span></div>
      <div>
        ${p.status==="Completed"
          ?`<span style="display:inline-flex;align-items:center;gap:4px;background:#dcfce7;color:#166534;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;">✓ Paid</span>`
          :`<span style="display:inline-flex;align-items:center;gap:4px;background:#fef9c3;color:#854d0e;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;">Pending</span>`}
      </div>
    </div>`;
  }).join("");

  // selected date side panel
  const sidePanelHtml = selDateStr ? `
  <div style="width:300px;flex-shrink:0;background:#fff;border-radius:16px;box-shadow:0 1px 16px rgba(0,0,0,.08);overflow:hidden;">
    <div style="padding:16px 18px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center;">
      <div>
        <div style="font-size:14px;font-weight:700;color:#0f172a;">${monthNames[month]} ${selectedDate}</div>
        <div style="font-size:12px;color:#94a3b8;margin-top:2px;">${selPayments.length} payment${selPayments.length!==1?"s":""}</div>
      </div>
      <span onclick="selectCalDate(null)" style="cursor:pointer;color:#94a3b8;font-size:16px;padding:2px 6px;border-radius:6px;"
        onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='transparent'">✕</span>
    </div>
    ${selPayments.length===0
      ?`<div style="padding:32px;text-align:center;color:#94a3b8;font-size:13px;">No payments on this date.</div>`
      :selPayments.map(p=>{
        const sym = p.currency==="EUR"?"€":"$";
        return `<div style="padding:16px 18px;border-bottom:1px solid #f1f5f9;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
            <div style="font-size:13px;font-weight:700;color:#0f172a;flex:1;padding-right:8px;">${p.influencerName}</div>
            <div style="font-size:16px;font-weight:800;color:#0f172a;white-space:nowrap;">${sym}${p.amount.toLocaleString()}</div>
          </div>
          <div style="font-size:11px;color:#94a3b8;margin-bottom:6px;">${p.influencerId} · ${p.region}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            <span style="background:${p.type==="Monthly Fee"?"#eff6ff":"#f5f3ff"};color:${p.type==="Monthly Fee"?"#2563eb":"#7c3aed"};border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700;">${p.type}</span>
            <span style="background:#f1f5f9;color:#475569;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:600;">${p.currency}</span>
            ${p.status==="Completed"?`<span style="background:#dcfce7;color:#166534;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700;">✓ Paid</span>`:""}
          </div>
        </div>`;
      }).join("")}
  </div>` : "";

  return `
  <div style="animation:fadeUp .4s ease both;">

    <!-- Header -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <div>
        <h1 style="font-size:22px;font-weight:800;color:#0f172a;letter-spacing:-.5px;">Payment Calendar</h1>
        <p style="font-size:13px;color:#64748b;margin-top:3px;">View influencer payment schedule. Click a date to see details.</p>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <!-- View toggle -->
        <div style="display:flex;border:1.5px solid #e2e8f0;border-radius:9px;overflow:hidden;">
          <button onclick="setCalView('month')" style="padding:7px 14px;border:none;background:${view==="month"?"#2563eb":"#fff"};color:${view==="month"?"#fff":"#64748b"};cursor:pointer;font-size:12px;font-weight:600;font-family:'Outfit',sans-serif;">📅 Month</button>
          <button onclick="setCalView('list')"  style="padding:7px 14px;border:none;background:${view==="list"?"#2563eb":"#fff"};color:${view==="list"?"#fff":"#64748b"};cursor:pointer;font-size:12px;font-weight:600;font-family:'Outfit',sans-serif;">☰ List</button>
        </div>
        <!-- Month nav -->
        <div style="display:flex;align-items:center;gap:4px;background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;padding:4px 8px;">
          <button onclick="navCalMonth(-1)" style="border:none;background:transparent;cursor:pointer;font-size:16px;color:#374151;padding:2px 6px;border-radius:6px;"
            onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='transparent'">‹</button>
          <span style="font-size:13px;font-weight:700;color:#0f172a;min-width:130px;text-align:center;">${monthNames[month]} ${year}</span>
          <button onclick="navCalMonth(1)"  style="border:none;background:transparent;cursor:pointer;font-size:16px;color:#374151;padding:2px 6px;border-radius:6px;"
            onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='transparent'">›</button>
        </div>
      </div>
    </div>

    <!-- Summary strip -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;">
      ${[
        {label:"Total Due This Month", value:"$"+totalPending.toLocaleString(), sub:`${pendingCount} payments pending`, color:"#1d4ed8", bg:"#eff6ff"},
        {label:"Total Paid This Month", value:"$"+totalPaid.toLocaleString(), sub:`${monthPayments.filter(p=>p.status==="Completed").length} payments done`, color:"#166534", bg:"#dcfce7"},
        {label:"Due Soon", value:upcomingCount+" payment"+(upcomingCount!==1?"s":""), sub:"due within 3 days", color:"#92400e", bg:"#fef9c3"},
        {label:"Total Influencers", value:[...new Set(monthPayments.map(p=>p.influencerId))].length+" people", sub:"across "+[...new Set(monthPayments.map(p=>p.region))].length+" regions", color:"#6d28d9", bg:"#f5f3ff"},
      ].map(c=>`<div style="background:${c.bg};border-radius:12px;padding:14px 16px;">
        <div style="font-size:10px;font-weight:700;color:${c.color};letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px;">${c.label}</div>
        <div style="font-size:18px;font-weight:800;color:#0f172a;">${c.value}</div>
        <div style="font-size:11px;color:#64748b;margin-top:2px;">${c.sub}</div>
      </div>`).join("")}
    </div>

    ${view==="month" ? `
    <!-- Month view -->
    <div style="display:flex;gap:16px;">
      <div style="flex:1;min-width:0;">
        <div style="background:#fff;border-radius:16px;box-shadow:0 1px 12px rgba(0,0,0,.06);overflow:hidden;">
          <!-- Day headers -->
          <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:12px 12px 8px;background:#f8fafc;border-bottom:1px solid #f1f5f9;">
            ${dayNames.map(d=>`<div style="text-align:center;font-size:11px;font-weight:700;color:#94a3b8;">${d}</div>`).join("")}
          </div>
          <div style="padding:10px 12px 12px;display:flex;flex-direction:column;gap:4px;">
            ${calGrid}
          </div>
          <!-- Legend -->
          <div style="padding:10px 16px;border-top:1px solid #f1f5f9;display:flex;gap:16px;flex-wrap:wrap;">
            ${[
              {color:"#dbeafe",text:"Pending payment"},
              {color:"#dcfce7",text:"Paid"},
              {color:"#fcd34d",text:"Due soon (≤3 days)"},
            ].map(l=>`<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#64748b;">
              <div style="width:10px;height:10px;border-radius:3px;background:${l.color};"></div>${l.text}
            </div>`).join("")}
          </div>
        </div>
      </div>
      ${sidePanelHtml}
    </div>
    ` : `
    <!-- List view -->
    <div style="background:#fff;border-radius:16px;box-shadow:0 1px 12px rgba(0,0,0,.06);overflow:hidden;">
      <div style="display:grid;grid-template-columns:100px 1fr 140px 160px 100px;padding:10px 20px;gap:12px;background:#f8fafc;border-bottom:1px solid #f1f5f9;">
        ${["Due Date","Influencer","Type","Amount","Status"].map(h=>`<div style="font-size:11px;font-weight:700;color:#64748b;">${h}</div>`).join("")}
      </div>
      ${sortedPayments.length===0?`<div style="padding:40px;text-align:center;color:#94a3b8;font-size:13px;">No payments this month.</div>`:listRows}
    </div>
    `}

  </div>`;
}

// ─── Main render ──────────────────────────────────────────────────────────────
function rerender() {
  renderNav();
  const el = document.getElementById("content");

  // ── Ads Performance page ──
  if (S.activeNav === "Payment Calendar") {
    document.getElementById("breadcrumb").textContent = "📅 Payment Calendar";
    el.innerHTML = paymentCalendarHTML();
    return;
  }
  if (S.activeNav === "Asset Library") {
    document.getElementById("breadcrumb").textContent = "🎨 Asset Library";
    el.innerHTML = damLibraryHTML();
    return;
  }
  if (S.activeNav === "Upload Asset") {
    document.getElementById("breadcrumb").textContent = "🎨 Upload Asset";
    el.innerHTML = damUploadHTML();
    return;
  }
  if (S.activeNav === "Ads Performance") {
    document.getElementById("breadcrumb").textContent = "📈 Ads Performance";
    el.innerHTML = adsPerformanceHTML();
    return;
  }
  if (S.activeNav === "Channel Budget Management") {
    document.getElementById("breadcrumb").textContent = "💰 Channel Budget Management";
    el.innerHTML = channelBudgetHTML();
    return;
  }
  document.getElementById("breadcrumb").textContent = "🚀 Launch Ads";
  const header = `
    <div style="margin-bottom:24px;animation:fadeUp .4s ease both;">
      <h1 style="font-size:22px;font-weight:800;color:#0f172a;letter-spacing:-.5px;">Launch Ads</h1>
      <p style="font-size:13px;color:#64748b;margin-top:3px;">选择 Campaign，设置广告预算（从 Campaign 总预算扣除），一键投放。</p>
    </div>`;

  if (S.launched && S.launchSnapshot) {
    el.innerHTML = header + successHTML();
    return;
  }

  const nc = canNext();
  el.innerHTML = `
    ${header.replace("</div>", `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:-16px;margin-bottom:8px;">
        <div></div>
        <div style="display:flex;align-items:center;gap:4px;">${stepperHTML()}</div>
      </div>
    </div>`)}
    <div class="grid2${S.step===4?" full":""}">
      <div class="card">
        ${stepContentHTML()}
        ${S.step<4?`
        <div style="display:flex;justify-content:space-between;margin-top:24px;padding-top:20px;border-top:1px solid #f1f5f9;">
          <button class="btn-back" onclick="goBack()" ${S.step===0?"disabled":""}>← 返回</button>
          <button class="btn-next" onclick="goNext()" ${nc?"":"disabled"}
            style="background:${nc?"#2563eb":"#e2e8f0"};color:${nc?"#fff":"#94a3b8"};box-shadow:${nc?"0 2px 12px rgba(37,99,235,.25)":"none"};">
            ${S.step===3?"确认 →":"下一步 →"}
          </button>
        </div>`:""}
      </div>
      ${S.step<4?`<div>${rightPanelHTML()}</div>`:""}
    </div>`;
}

// ─── Actions ──────────────────────────────────────────────────────────────────
function selectCampaign(id)   { S.form.campaign = S.campaigns.find(c=>c.id===id); rerender(); }
function selectPlatform(id)   { S.form.platform = id; rerender(); }
function setField(key, val)   { S.form[key] = val; }
function goStep(i)            { S.step = i; rerender(); }
function goNext() {
  if (!canNext() || S.step>=4) return;
  let nextStep = S.step + 1;
  // Skip budget step (2) for external platforms
  if (S.step===1 && isExtPlatform()) nextStep = 3;
  S.step = nextStep;
  rerender();
}
function goBack() {
  if (S.step<=0) return;
  let prevStep = S.step - 1;
  // Skip budget step (2) going back for external platforms
  if (S.step===3 && isExtPlatform()) prevStep = 1;
  S.step = prevStep;
  rerender();
}

function doReset() {
  S.step=0; S.launched=false; S.launchSnapshot=null;
  S.form={campaign:null,platform:null,dailyBudget:"",totalBudget:"",startDate:"",endDate:"",objective:"",audience:"",adName:"",utm:""};
  rerender();
}

function doLaunch() {
  const lc = liveC();
  const et = estTotal();
  const snap = { campaignId:lc.id, campaignName:lc.name, spend:et };
  S.launchSnapshot = snap;
  // Deduct from adSpent
  S.campaigns = S.campaigns.map(c => c.id===lc.id ? {...c, adSpent:c.adSpent+et} : c);
  // Spinner
  const btn = document.getElementById("launchBtn");
  if (btn) { btn.disabled=true; btn.style.background="#94a3b8"; btn.style.boxShadow="none"; btn.innerHTML=`<div class="spin-el"></div> 提交中...`; }
  setTimeout(()=>{ S.launched=true; rerender(); }, 2000);
}

function togglePerf(id)       { S.perf.expandedId = S.perf.expandedId===id ? null : id; rerender(); }
function setRankBy(key)       { S.perf.rankBy = key; rerender(); }
function setPeriod(p)         { S.perf.period = p; rerender(); }
function setPerfFilter(k, v)  { S.perf[k] = v; rerender(); }
function clearAllFilters()    { S.perf.filterChannel="All"; S.perf.filterCampaign="All"; S.perf.filterCountry="All"; rerender(); }

function selectCountry(id)        { S.cbm.selectedCountryId=id; S.cbm.selectedChannelId=null; S.cbm.showAddInvoice=false; S.cbm.showAddChannel=false; S.cbm.showAddCountry=false; rerender(); }
function selectChannel(id)        { S.cbm.selectedChannelId=id; S.cbm.showAddInvoice=false; S.cbm.expandedInvoiceId=null; rerender(); }
function toggleInvoice(id)        { S.cbm.expandedInvoiceId = S.cbm.expandedInvoiceId===id?null:id; rerender(); }
function toggleAddInvoice()       {
  S.cbm.showAddInvoice=!S.cbm.showAddInvoice;
  const cty = S.countryBudgets.find(c=>c.id===S.cbm.selectedCountryId);
  const ch  = cty?.channels.find(c=>c.id===S.cbm.selectedChannelId);
  S.cbm.newInv={invoiceNo:"",date:"",amount:"",currency:ch?.currency||"USD",fileName:"",allocations:{}};
  rerender();
}
function setCbmField(k,v)         { S.cbm.newInv[k]=v; }
function setCbmAlloc(cid,v)       { S.cbm.newInv.allocations[cid]=v; }
function markPaid(id)             {
  const today = new Date().toISOString().split("T")[0];
  S.invoices = S.invoices.map(i=>i.id===id?{...i,status:"Paid",paidDate:today}:i);
  rerender();
}
function submitInvoice() {
  const cty = S.countryBudgets.find(c=>c.id===S.cbm.selectedCountryId);
  const ch  = cty?.channels.find(c=>c.id===S.cbm.selectedChannelId);
  const n   = S.cbm.newInv;
  const allocs = (ch?.campaigns||[]).map(cid=>({
    campaignId:cid,
    campaignName:S.campaigns.find(c=>c.id===cid)?.name||cid,
    amount:Number(n.allocations[cid]||0)
  })).filter(a=>a.amount>0);
  const newInvoice = {
    id:"inv"+Date.now(), channelId:ch.id, countryId:cty.id,
    invoiceNo:n.invoiceNo, date:n.date,
    amount:Number(n.amount), currency:ch.currency,
    status:"Pending", paidDate:null,
    fileName:n.fileName||"", allocations:allocs
  };
  S.invoices = [newInvoice, ...S.invoices];
  S.cbm.showAddInvoice=false;
  S.cbm.expandedInvoiceId=newInvoice.id;
  rerender();
}
function toggleAddChannel() {
  S.cbm.showAddChannel = !S.cbm.showAddChannel;
  S.cbm.newChannel = { name:"", currency:"USD", monthlyBudget:"", type:"external", campaigns:[] };
  rerender();
}
function toggleAddCountry() {
  S.cbm.showAddCountry = !S.cbm.showAddCountry;
  S.cbm.newCountry = { country:"", currency:"USD", totalMonthlyBudget:"" };
  rerender();
}
function setNewChannel(k, v)          { S.cbm.newChannel[k]=v; rerender(); }
function toggleNewChannelCampaign(id) {
  const c = S.cbm.newChannel.campaigns;
  S.cbm.newChannel.campaigns = c.includes(id) ? c.filter(x=>x!==id) : [...c,id];
  rerender();
}
function submitNewChannel() {
  const n = S.cbm.newChannel;
  const newCh = { id:"ch"+Date.now(), name:n.name, currency:n.currency, monthlyBudget:Number(n.monthlyBudget), type:n.type, campaigns:[...n.campaigns] };
  S.countryBudgets = S.countryBudgets.map(cty =>
    cty.id===S.cbm.selectedCountryId ? {...cty, channels:[...cty.channels, newCh]} : cty
  );
  S.cbm.selectedChannelId = newCh.id;
  S.cbm.showAddChannel = false;
  S.cbm.newChannel = { name:"", currency:"USD", monthlyBudget:"", type:"external", campaigns:[] };
  rerender();
}

function openTlModal(assetId) {
  const a = S.assets.find(x=>x.id===assetId);
  S.dam.tlModal = {
    show: true,
    landingUrl: "",
    source: a ? a.channels[0]?.toLowerCase().replace(/\s+/g,"-") : "",
    country: a ? (a.countries[0]||"") : "",
    term: "",
    generatedUrl: "",
  };
  rerender();
}
function closeTlModal()        { S.dam.tlModal = { show:false, landingUrl:"", source:"", country:"", term:"", generatedUrl:"" }; rerender(); }
function setTlField(k,v)       { S.dam.tlModal[k] = v; }
function copyTlUrl(url) {
  navigator.clipboard?.writeText(url).catch(()=>{});
  S.dam.tlModal.generatedUrl = url;
  rerender();
}

// Calendar actions
function navCalMonth(dir) {
  let m = S.cal.month + dir;
  let y = S.cal.year;
  if (m > 11) { m = 0; y++; }
  if (m < 0)  { m = 11; y--; }
  S.cal.month = m; S.cal.year = y; S.cal.selectedDate = null;
  rerender();
}
function selectCalDate(d)    { S.cal.selectedDate = d===S.cal.selectedDate?null:d; rerender(); }
function setCalView(v)       { S.cal.view = v; rerender(); }
function markPaymentPaid(id) {
  const today = new Date().toISOString().split("T")[0];
  S.influencerPayments = S.influencerPayments.map(p=>p.id===id?{...p,status:"Completed",paidDate:today}:p);
  rerender();
}

// DAM actions
function setDamView(v)            { S.dam.view=v; rerender(); }
function setDamFilter(k,v)        { S.dam.filters[k]=v; rerender(); }
function setDamSearch(v)          { S.dam.searchQ=v; rerender(); }
function setDamSort(v)            { S.dam.sort=v; rerender(); }
function toggleDamActive()        { S.dam.filters.activeOnly=!S.dam.filters.activeOnly; rerender(); }
function selectAsset(id)          { S.dam.selectedAssetId=id; rerender(); }
function toggleFav(id)            { S.assets=S.assets.map(a=>a.id===id?{...a,favorites:!a.favorites}:a); rerender(); }
function toggleAssetActive(id)    { S.assets=S.assets.map(a=>a.id===id?{...a,isActive:!a.isActive}:a); rerender(); }
function approveAsset(id)         { S.assets=S.assets.map(a=>a.id===id?{...a,complianceStatus:"Approved",approvedBy:"Current User",approvalDate:new Date().toISOString().split("T")[0]}:a); rerender(); }
function rejectAsset(id)          { S.assets=S.assets.map(a=>a.id===id?{...a,complianceStatus:"Rejected"}:a); rerender(); }
function setDamNew(k,v)           { S.dam.newAsset[k]=v; rerender(); }
function toggleDamField(field,val){ const arr=S.dam.newAsset[field]||[]; S.dam.newAsset[field]=arr.includes(val)?arr.filter(x=>x!==val):[...arr,val]; rerender(); }
function setActiveNav(label)      { S.activeNav=label; rerender(); }
function submitAsset() {
  const n = S.dam.newAsset;
  const now = new Date().toISOString().split("T")[0];
  S.assets = [{
    id:"AST-"+String(S.assets.length+1).padStart(3,"0"),
    name:n.name, type:n.type, format:"TBD", size:"—", dimensions:"—",
    uploadedBy:"Amanda", uploadDate:now, lastUpdated:now,
    campaign:n.campaign, mktType:n.mktType, funnel:n.funnel,
    channels:n.channels, countries:n.countries, languages:n.languages,
    entity:n.entity, complianceStatus:"Draft", approvedBy:"", approvalDate:"",
    licenseType:n.licenseType, expiryDate:n.expiryDate, restrictedRegions:n.restrictedRegions,
    isActive:false, favorites:false,
    thumbnail:`https://placehold.co/400x300/6366f1/ffffff?text=${encodeURIComponent(n.type)}`,
    performance:null
  }, ...S.assets];
  S.dam.newAsset={name:"",type:"Image",campaign:"",mktType:"Promotion",funnel:"Awareness",channels:[],countries:[],languages:[],entity:[],licenseType:[],restrictedRegions:[],expiryDate:"",complianceStatus:"Draft",isActive:false};
  S.activeNav="Asset Library";
  rerender();
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
rerender();
</script>
</body>
